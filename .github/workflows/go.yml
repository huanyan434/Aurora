name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 【关键修改】全局设置所有 run 命令的工作目录为 backend
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        cache-dependency-path: ./go.sumc

    - name: Download Dependencies
      # 现在这个命令会在 ./backend 目录下运行，能正确找到 go.mod
      run: go mod tidy

    - name: Build
      # 构建当前目录 (.)，因为工作目录已经是 backend 了
      run: |
        echo "Building from directory: $(pwd)"
        go build -v -o aurora_backend ./main.go
        # 再次确认文件是否生成
        ls -la aurora_backend
        if [ ! -f "aurora_backend" ]; then 
          echo "ERROR: Build succeeded but file not found!"; 
          exit 1; 
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aurora_backend      # 下载时看到的文件名
        path: ./aurora_backend    # 这里填你上面 go build 生成的文件路径
