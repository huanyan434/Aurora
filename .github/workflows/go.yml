name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 保持你的全局设置
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        cache-dependency-path: backend/go.sum

    - name: Download Dependencies
      run: go mod tidy

    - name: Build
      run: |
        echo "Building in $(pwd)"
        go build -v -o aurora_backend ./main.go
        # 确认文件在当前目录 (backend)
        ls -la aurora_backend 

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aurora_backend
        # 【核心修复】明确指向 backend 子目录
        path: backend/aurora_backend
        if-no-files-found: error
