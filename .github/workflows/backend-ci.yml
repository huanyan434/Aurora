name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  # ================= 后端构建 (Go) =================
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        cache-dependency-path: backend/go.sum

    - name: Build Backend
      run: |
        echo "Building Go backend..."
        go build -v -o aurora-backend main.go

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aurora-backend
        path: backend/aurora-backend
        if-no-files-found: error
