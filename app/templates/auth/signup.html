<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Aurora</title>
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="alert-container"></div>

    <div class="auth-container">        
        <div class="auth-card left">
            <div class="header">
                <img src="/static/icon.png" width="50" height="50" />
                <h2>Aurora</h2>
            </div>
            <div class="con1">
                <p>简洁 极速 便捷 AI 站</p>
            </div>
            <div class="con2">
                <p>毫秒级响应，图片识别支持，全场景覆盖。</p>
            </div>
            <div class="con3">
                <div class="block">
                    <span>快速响应</span>
                    <p>毫秒级响应，让您的需求得到及时处理。</p>
                </div>
                <div class="block">
                    <span>图片识别</span>
                    <p>突破传统界限，不止步于文字。更出色的识图模型。</p>
                </div>
                <div class="block">
                    <span>优质服务</span>
                    <p>24小时客服，时刻与您保持联系。疑难杂症统统解决。</p>
                </div>
                <div class="block">
                    <span>实惠会员</span>
                    <p>仅需￥10/月的VIP，￥20/月的SVIP。让您与众不同。</p>
                </div>
            </div>
            <div class="con4">
                <div class="block">
                    高效
                </div>
                <div class="block">
                    实用
                </div>
                <div class="block">
                    实惠
                </div>
            </div>
            <div class="footer">
                <p>© 2025 Aurora</p>
            </div>
        </div>
        <div class="auth-card right">
            <div class="auth-header">
                <h2>创建账号</h2>
                <p>请填写以下信息完成注册</p>
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required
                        placeholder="请输入用户名">
            </div>

            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" name="email" required
                        placeholder="请输入您的邮箱">
            </div>
            
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label for="verify_code">验证码</label>
                <div style="display: flex; align-items: center;">
                    <input type="text" id="verify_code" name="verify_code" required
                        placeholder="请填写验证码">
                    <div class="verify_code_button">
                        获取验证码
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required
                        placeholder="请设置密码">
            </div>
            
            <button type="submit" class="submit-btn">注册</button>
            
            <div class="auth-footer">
                已有账号？<a href="/auth/login">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // auth 消息通知函数
        function showNotification(message, type, timeout=3500) {
            const alertsContainer = document.querySelector('.alert-container');

            // 追加新通知
            const notification = document.createElement('div');
            notification.classList.add('popup-alert');
            notification.classList.add(type);
            notification.textContent = message;
            // zIndex为当前时间
            notification.style.zIndex = Date.now();

            alertsContainer.appendChild(notification);

            
            // 设置通知消失
            setTimeout(() => {
                notification.style.animation = 'fadeOut 0.3s ease-in';
            }, timeout - 290)
            setTimeout(() => {
                notification.style.display = `none`;
                notification.remove();
            }, timeout);
        }
            
        document.querySelector('.verify_code_button').addEventListener('click', function() {
            const verify_code_button = document.querySelector('.verify_code_button');
            if (verify_code_button.disabled) {
                return;
            }
            verify_code_button.disabled = true;
            // 获取 email
            var email = document.querySelector('#email').value;
            if (email === '') {
                showNotification('请先填写邮箱地址', "error");
                verify_code_button.disabled = false;
            } else {
                fetch('/auth/send_verify_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ "email": email })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        verify_code_button.style.backgroundColor = '#ccc';
                        verify_code_button.style.cursor = 'not-allowed';
                        verify_code_button.innerHTML = '60秒后重试';
                        // 倒计时60秒
                        let countdown = 60;
                        const interval = setInterval(() => {
                            countdown--;
                            verify_code_button.innerHTML = `${countdown}秒后重试`;
                            if (countdown === 0) {
                                clearInterval(interval);
                                verify_code_button.disabled = false;
                                verify_code_button.style.removeProperty('background-color');
                                verify_code_button.style.removeProperty('cursor');
                                verify_code_button.innerHTML = '获取验证码';
                            }
                        }, 1000);
                        showNotification('验证码已发送到您的邮箱，请注意查收', "info");
                    } else {
                        verify_code_button.disabled = false;
                        showNotification('验证码发送失败，请稍后再试', "error");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            }
        });

        document.querySelector('.submit-btn').addEventListener('click', function(event) {
            // 获取表单内容
            const username = document.querySelector('#username').value;
            const email = document.querySelector('#email').value;
            const verify_code = document.querySelector('#verify_code').value;
            const password = document.querySelector('#password').value;
            if (!username || !email || !verify_code || !password) {
                showNotification('请填写所有字段', "error");
                return;
            }

            fetch('/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    'username': username,
                    'email': email,
                    'verify_code': verify_code,
                    'password': password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification('注册成功，请登录', "info");
                    setTimeout(() => {
                        window.location.href = '/auth/login';
                    }, 500);
                } else {
                    showNotification(data.message, "error");
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
